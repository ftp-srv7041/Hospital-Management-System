version: '3.8'

services:
  mysqldb:
    image: mysql:8.0
    container_name: hospital_db_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hospital_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hospital-network

  backend:
    build: ./backend
    container_name: hospital_backend_container
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysqldb:3306/hospital_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      - mysqldb
    networks:
      - hospital-network

  frontend:
    build: ./frontend
    container_name: hospital_frontend_container
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - hospital-network

volumes:
  mysql_data:

networks:
  hospital-network:
